# ACE Account — Noise Domains
# Domains that should be unsubscribed and/or deleted from the ace inbox.
# These are confirmed non-business senders flooding the ace engineering mailbox.
#
# Referenced by: scripts/email/batch-unsubscribe.sh
# Related: scripts/email/email-routing.yaml (DELETE rules)
# Issue: #1991

# Action key:
#   UNSUBSCRIBE  — execute List-Unsubscribe header, then delete historical messages
#   DELETE_ONLY  — no unsubscribe header expected; just delete and filter
#   ALREADY_DONE — previously unsubscribed; kept here for reference

domains:
