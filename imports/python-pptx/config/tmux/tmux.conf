# workspace-hub shared tmux config
# Install: ln -sf "$(git rev-parse --show-toplevel)/config/tmux/tmux.conf" ~/.tmux.conf

# Prefix: C-a instead of C-b
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Terminal — 256-color and true-color support
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"

# Mouse support
set -g mouse on

# Vi mode
setw -g mode-keys vi

# Vi copy-mode bindings
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# Intuitive pane splitting (| vertical, - horizontal) in current path
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# New window inherits current path
bind c new-window -c "#{pane_current_path}"

# Status bar
set -g status-style 'bg=#333333 fg=#5eacd3'
set -g status-left '[#S] '
set -g status-right '#H | %Y-%m-%d %H:%M'

# Start windows/panes at 1
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows on close
set -g renumber-windows on

# Faster escape (important for vim/vi users)
set -sg escape-time 10

# Increase scrollback
set -g history-limit 10000
