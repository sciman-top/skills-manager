    download_size_estimate: "5 MB"
    integration_fit: high
    integration_notes: >-
      Pure Python. pip install. Minimal deps. BSD license. Beam analysis validated
      against analytical (0% error). Plate BCs require expert FEM knowledge. No shell
      elements limits offshore use. Best for beam-level prototyping; defer for production.
      Eval: docs/research/scikit-fem-eval.md. Issue: #1489.
