# harness-config.yaml — Single source of truth for harness readiness checks
# Used by: nightly-readiness.sh, compare-harness-state.sh, remediate-harness.sh
# Update skill_count_baseline / command_count_baseline via:
#   bash scripts/readiness/nightly-readiness.sh --update-baseline
schema_version: 1

required_plugins:
  - frontend-design
  - skill-creator
  - code-review
  - pr-review-toolkit
  - feature-dev
  - playground
  - pyright-lsp
  - claude-md-management
  - hookify
  - superpowers

skill_count_baseline: 0        # set on first --update-baseline run; 0 = skip count check
command_count_baseline: 0      # set on first --update-baseline run; 0 = skip count check

tier1_repos:
  - assetutilities
  - digitalmodel
  - worldenergydata
  - assethold

hook_static_max_lines: 200
hook_blocking_patterns:
  - 'git commit'
  - 'git push'
  - '\bcurl\b'
  - '\bwget\b'
  - 'http://'
  - 'https://'

workstations:
  dev-primary:
    ws_hub_path: /mnt/local-analysis/workspace-hub
    ssh_target: null
    report_path: .claude/state/harness-readiness-dev-primary.yaml
  dev-secondary:
    ws_hub_path: /mnt/workspace-hub
    ssh_target: ace2
    report_path: .claude/state/harness-readiness-dev-secondary.yaml
  licensed-win-1:
    ws_hub_path: 'D:\\workspace-hub'
    ssh_target: null
    linux_reachable: false
    report_path: .claude/state/harness-readiness-licensed-win-1.yaml
    notes: "Windows/Git Bash — Windows Task Scheduler writes report to shared mount"
  macbook-portable:
    hostname: Vamsees-MacBook-Air
    hostname_aliases: [Vamsees-MacBook-Air.local]
    ws_hub_path: /Users/krishna/workspace-hub
    ssh_target: null
    linux_reachable: false
    report_path: .claude/state/harness-readiness-macbook-portable.yaml
    notes: "macOS portable — no SSH from Linux; no cron; report generated locally"

hermes:
  external_skills_dir_suffix: .claude/skills   # appended to ws_hub_path per workstation
  patch_file: config/agents/hermes/patches/exclude-archive-skill-dirs.patch
  config_template: config/agents/hermes/config.yaml.template
  health_checks:
    - binary_exists        # hermes --version
    - venv_import          # hermes_cli.main importable
    - patch_applied        # EXCLUDED_SKILL_DIRS contains _archive
    - external_skills_dir  # skills.external_dirs path exists and has SKILL.md files
    - config_managed_keys  # managed keys match template values

prerequisites:
  - jq
  - git
  - uv
  - claude
