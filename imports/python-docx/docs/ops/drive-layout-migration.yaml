# drive-layout-migration.yaml — Ace drive layout standardization plan
# Issue: #1544
# Generated: 2026-03-31
# Status: PLAN ONLY — no data moves or script edits in this PR
#
# Convention:
#   /mnt/ace/<repo-name>/<domain>/...
#   Scripts use ${ACE_DATA_ROOT:-/mnt/ace} — never hardcode mount prefix
#   Remote mounts mirror the same tree so paths are portable across hosts

schema_version: "1.0.0"
generated: "2026-03-31"
issue: 1544
depends_on: 1543  # mount-map.yaml, .env.example

# ── Target convention ────────────────────────────────────────────────────────

convention:
  pattern: "${ACE_DATA_ROOT}/<repo-name>/<domain>/..."
  env_var: ACE_DATA_ROOT
  default_value: /mnt/ace
  rules:
    - level_1: repo name (matches GitHub repo exactly)
    - level_2: domain (functional area within that repo)
    - level_3_plus: free-form per domain needs
    - scripts: "must use ${ACE_DATA_ROOT:-/mnt/ace}, never hardcode /mnt/ace"
    - remote: "ace-linux-2 mounts at /mnt/remote/ace-linux-1/ace — same subtree"
  examples:
    - "${ACE_DATA_ROOT}/workspace-hub/document-index/summaries/"
    - "${ACE_DATA_ROOT}/digitalmodel/hydro/"
    - "${ACE_DATA_ROOT}/digitalmodel/docs/domains/"

