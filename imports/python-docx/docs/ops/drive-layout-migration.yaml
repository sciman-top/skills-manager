# ── Migration execution order ───────────────────────────────────────────────
# When ready to execute (separate issues):

execution_phases:

  - phase: 1
    title: "Environment variable foundation"
    description: >
      Create a shared env-loading script (scripts/lib/env.sh) that sources
      .env and exports all standardized variables. Add to shell profiles.
    files_to_create:
      - scripts/lib/env.sh
    blocked_by: []

  - phase: 2
    title: "Script migration — automation and coordination"
    description: >
      Update all scripts/automation/*.sh and scripts/coordination/git/*.sh
      to source env.sh and use ${WORKSPACE_HUB_ROOT}.
    target_categories:
      - "legacy /mnt/github/ references → shell automation scripts"
    blocked_by: [1]

  - phase: 3
    title: "Script migration — document-index and doc-intelligence"
    description: >
      Update document-index scripts to use ${ACE_DATA_ROOT}.
      Update config.yaml with env-var-aware paths.
    target_categories:
      - "ace drive /mnt/ace/ references → document-index scripts and config"
      - "ace drive /mnt/ace/ references → doc-intelligence extraction scripts"
    blocked_by: [1]

  - phase: 4
    title: "Test fixture cleanup"
    description: >
      Convert absolute paths in test data YAML files to relative paths.
      Update capytaine benchmarks to use CAPYTAINE_ENV env var.
    target_categories:
      - "local drive references → asset integrity test data fixtures"
      - "local drive references → capytaine test benchmarks"
    blocked_by: [1]

  - phase: 5
    title: "Ace drive directory restructuring"
    description: >
      Create symlinks for non-repo-aligned directories under /mnt/ace/.
      E.g., /mnt/ace/workspace-hub/standards/og → /mnt/ace/O&G-Standards.
      No data moves — symlinks only for backward compatibility.
    blocked_by: [1, 2, 3]

  - phase: 6
    title: "Codex TOML and knowledge files"
    description: >
      Address .codex/agents/*.toml hardcoded paths. May require wrapper
      scripts or symlinks since TOML doesn't support env var expansion.
      Update knowledge/seeds/ YAML files.
    target_categories:
      - "local drive references → codex agent TOML configs"
      - "ace drive references → knowledge seed files"
    blocked_by: [1]

  - phase: 7
    title: "Legacy script deprecation"
    description: >
      Mark digitalmodel/.claude/commands/legacy-scripts/ as deprecated.
      Either update paths or add deprecation notices pointing to replacements.
    target_categories:
      - "legacy /mnt/github/ references → legacy python scripts"
    blocked_by: [2]

# ── Risks and notes ─────────────────────────────────────────────────────────

risks:
  - id: codex_toml_no_env_vars
    severity: medium
    description: >
      Codex TOML files (10 files, 50+ path references) do not support
      environment variable expansion. Options: (a) wrapper script that
      generates TOML from template, (b) symlink /mnt/local-analysis/workspace-hub
      to canonical location on all machines, (c) accept as machine-specific.

  - id: knowledge_seed_bulk_paths
    severity: low
    description: >
      naval-architecture-resources.yaml has 40+ hardcoded /mnt/ace/ paths.
      Could add a path_prefix field at the top level and use relative paths
      in individual entries.

  - id: large_directory_moves
    severity: high
    description: >
      /mnt/ace/O&G-Standards and /mnt/ace/docs are very large directories.
      Use symlinks rather than physical moves to avoid multi-hour copy operations
      and to maintain backward compatibility.

  - id: mounted_source_registry_coupling
    severity: medium
    description: >
      mounted-source-registry.yaml defines mount_root paths used by the
      document-intelligence pipeline. Changes here must be coordinated with
      any running indexing jobs.
