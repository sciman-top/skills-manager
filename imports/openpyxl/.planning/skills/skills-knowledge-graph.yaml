# ─────────────────────────────────────────────
# Relationship edges
# ─────────────────────────────────────────────
# Types:
#   feeds        — output of A is input to B
#   dependency   — A requires B to function
#   composition  — A and B commonly used together in sequence
#   alternative  — A can substitute for B
#   see_also     — related reference
#   shared_infra — A and B share packages or data formats

edges:

  # ── Marine/offshore pipeline flows ────────
  - from: "digitalmodel/orcaflex-modeling"
