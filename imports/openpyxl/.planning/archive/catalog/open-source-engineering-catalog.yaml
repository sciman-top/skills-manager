# Open-Source Engineering Software Catalog
# For ACE Ecosystem Integration (digitalmodel, worldenergydata, assetutilities)
# Reference: workspace-hub issue #1397

schema_version: "1.0.0"
generated_at: "2026-03-25"
catalog_purpose: "Open-source engineering software for ACE ecosystem integration"
# Canonical domain taxonomy: specs/taxonomy/domains.yaml

domains:
  # ---------------------------------------------------------------------------
  fea_structural:
    description: "Finite Element Analysis & Structural Engineering"
    libraries:
      - name: FEniCSx (DOLFINx)
        url: https://github.com/FEniCS/dolfinx
        project_url: https://fenicsproject.org/
        license: "LGPL-3.0-or-later"
        maturity: stable
        python_api: native
        community: large
        capabilities:
          - "Variational form-based PDE solving"
          - "Parallel computing with MPI"
          - "Mixed finite elements"
          - "Nonlinear problems with Newton solvers"
          - "Mesh generation and refinement"
          - "Time-dependent and eigenvalue problems"
        relevance_to_ace: >
          General-purpose FEA foundation for structural mechanics in
          digitalmodel. Covers linear/nonlinear static and dynamic analysis
          of offshore structures, risers, and subsea equipment.
        integration_notes: >
          Native Python API makes it straightforward to wrap inside
          digitalmodel modules. DOLFINx meshes can be generated from Gmsh
          or Salome geometry pipelines. Results exportable to XDMF/VTK
          for post-processing.

      - name: CalculiX
        url: https://www.calculix.de/
        project_url: https://www.dhondt.de/
        license: "GPL-2.0-or-later"
        maturity: stable
        python_api: cli-only
        community: medium
        capabilities:
          - "Abaqus-compatible input format"
          - "Linear and nonlinear static/dynamic analysis"
          - "Contact mechanics"
          - "Thermal analysis"
          - "Frequency and buckling analysis"
          - "Plasticity and creep models"
        relevance_to_ace: >
          Abaqus-compatible solver enables reuse of existing offshore
          engineering FE models. Ideal for structural checks on jacket
          structures, risers, and subsea manifolds within digitalmodel.
        integration_notes: >
          Drive via subprocess from Python using pycalculix or custom
          wrappers. PrePoMax provides GUI pre/post-processing. Input deck
          generation can be scripted from digitalmodel geometry modules.

      - name: Code_Aster
        url: https://code-aster.org/
        project_url: https://www.code-aster.org/
        license: "GPL-3.0-or-later"
        maturity: stable
        python_api: bindings
        community: large
        capabilities:
          - "Thermo-mechanical analysis"
          - "Fatigue and fracture mechanics"
          - "Contact and friction"
          - "Seismic analysis"
          - "Fluid-structure interaction"
          - "Cable and beam elements"
        relevance_to_ace: >
          Strong fatigue and fracture capabilities directly applicable to
          riser fatigue life assessment, weld integrity, and SCF analysis
          in digitalmodel's structural modules.
        integration_notes: >
          Salome-Meca bundles geometry + meshing + solving. Python
          command files (.comm) can be generated programmatically. Pairs
          with Salome for geometry import from CAD models.

      - name: OpenSees
        url: https://github.com/OpenSees/OpenSees
        project_url: https://opensees.berkeley.edu/
        license: "GPL-3.0"
        maturity: stable
        python_api: native
        community: large
        capabilities:
          - "Nonlinear structural analysis"
          - "Earthquake engineering simulation"
          - "Fiber-section beam-column elements"
          - "Soil-structure interaction"
          - "Performance-based engineering"
          - "Parallel and sequential analysis"
        relevance_to_ace: >
          Seismic and dynamic analysis of offshore platforms and jackets.
          Soil-structure interaction modeling relevant to pile foundations
          and mudmat design in digitalmodel.
        integration_notes: >
          OpenSeesPy provides full Python scripting. Can be combined with
          digitalmodel's geotechnical modules for integrated pile-soil
          analysis. Output compatible with NumPy/Pandas workflows.

      - name: Kratos Multiphysics
        url: https://github.com/KratosMultiphysics/Kratos
        project_url: https://kratosmultiphysics.github.io/Kratos/
        license: "BSD-4-Clause"
        maturity: stable
        python_api: native
        community: large
        capabilities:
          - "Multi-physics coupled simulations"
          - "Structural mechanics"
          - "Fluid dynamics"
          - "Fluid-structure interaction"
          - "Contact mechanics"
          - "Shape optimization"
          - "HPC parallel computing"
        relevance_to_ace: >
          Multi-physics coupling (FSI, thermal-structural) directly
          applicable to VIV analysis, riser-wave interaction, and thermal
          analysis of subsea flowlines in digitalmodel.
        integration_notes: >
          Extensive Python interface; pip-installable. Modular application
          design aligns with digitalmodel's module architecture. BSD
          license allows commercial integration.

      - name: SfePy
        url: https://github.com/sfepy/sfepy
        project_url: https://sfepy.org/
        license: "BSD-3-Clause"
        maturity: maturing
        python_api: native
        community: small
        capabilities:
          - "Pure Python FEM framework"
          - "Linear elasticity and hyperelasticity"
          - "Acoustic and piezoelectric problems"
          - "Homogenization"
          - "Time-dependent and eigenvalue problems"
        relevance_to_ace: >
          Lightweight, pure-Python FEM solver useful for rapid prototyping
          of structural analysis within digitalmodel without heavy
          external dependencies.
        integration_notes: >
          pip-installable, direct NumPy/SciPy integration. Problem
          definitions in Python dictionaries make it easy to embed in
          digitalmodel calculation chains.

      - name: GetFEM
        url: https://getfem.org/
        project_url: https://getfem.org/
        license: "LGPL-3.0-or-later"
        maturity: stable
        python_api: bindings
        community: small
        capabilities:
          - "Generic finite element library"
          - "Contact and friction mechanics"
          - "Model bricks architecture"
          - "Level-set integration (XFEM)"
          - "Plasticity and large deformations"
        relevance_to_ace: >
          XFEM capabilities useful for crack propagation studies in
          offshore structural components. Contact mechanics for connector
          and clamp analysis.
        integration_notes: >
          Python interface via getfem module. Can be combined with Gmsh
          for meshing. LGPL license allows library linking without
          copyleft restrictions on calling code.

      - name: MOOSE
        url: https://github.com/idaholab/moose
        project_url: https://mooseframework.inl.gov/
        license: "LGPL-2.1-or-later"
        maturity: stable
        python_api: bindings
        community: large
        capabilities:
          - "Multiphysics simulation framework"
          - "Coupled thermo-mechanical analysis"
          - "Porous flow and geomechanics"
          - "Phase-field fracture"
          - "Automatic differentiation"
          - "Massively parallel (MPI + threads)"
        relevance_to_ace: >
          Coupled thermo-mechanical and porous flow capabilities relevant
          to wellbore integrity, cementing analysis, and geomechanics in
          digitalmodel's subsea and well engineering modules.
        integration_notes: >
          Python utilities for input generation and post-processing.
          Physics modules (PorousFlow, TensorMechanics) map to ACE
          engineering domains. Input files can be templated from
          digitalmodel parameters.

  # ---------------------------------------------------------------------------
  cfd:
    description: "Computational Fluid Dynamics"
    libraries:
      - name: OpenFOAM
        url: https://gitlab.com/openfoam/core/openfoam
        project_url: https://www.openfoam.com/
        license: "GPL-3.0-or-later"
        maturity: stable
        python_api: cli-only
        community: large
        capabilities:
          - "Incompressible and compressible flow"
          - "Multiphase flow (VOF, Euler-Euler)"
          - "Turbulence modeling (RANS, LES, DES)"
          - "Heat transfer and conjugate heat transfer"
          - "Mesh motion and dynamic mesh"
          - "Chemical reactions and combustion"
          - "Lagrangian particle tracking"
        relevance_to_ace: >
          Primary CFD tool for VIV studies, current loading on subsea
          structures, pipeline scouring, and riser hydrodynamic analysis.
          Directly relevant to digitalmodel's marine engineering modules.
        integration_notes: >
          Drive via PyFoam or custom Python wrappers. Case directory
          structure can be templated from digitalmodel parameters.
          Results postprocessable with ParaView and VTK Python bindings.
          Note: migrated from GitHub to GitLab in 2025.

      - name: SU2
        url: https://github.com/su2code/SU2
        project_url: https://su2code.github.io/
        license: "LGPL-2.1"
        maturity: stable
        python_api: bindings
        community: large
        capabilities:
          - "Compressible and incompressible flow"
          - "Aerodynamic shape optimization"
          - "Conjugate heat transfer"
          - "Turbomachinery flows"
          - "Adjoint-based design"
          - "Multiphysics coupling"
        relevance_to_ace: >
          Shape optimization capabilities applicable to hydrodynamic
          optimization of risers, fairings, and subsea structure
          geometries in digitalmodel.
        integration_notes: >
          Python wrapper (SU2_CFD) and mesh tools available. Can read
          Gmsh and CGNS meshes. Adjoint solver enables gradient-based
          optimization integrated into digitalmodel design workflows.

      - name: Palabos
        url: https://gitlab.com/unigespc/palabos
        project_url: https://palabos.unige.ch/
        license: "AGPL-3.0"
        maturity: maturing
        python_api: bindings
        community: medium
        capabilities:
          - "Lattice Boltzmann method"
          - "Multiphase and multicomponent flows"
          - "Thermal flows"
          - "Fluid-structure interaction"
          - "Porous media flows"
          - "Parallel computation (MPI)"
        relevance_to_ace: >
          LBM approach useful for pore-scale flow simulation in reservoir
          rocks and complex geometry flows relevant to O&G production
          systems. Complements traditional CFD methods.
        integration_notes: >
          C++ library with Python bindings. Minimal external dependencies.
          Can couple with digitalmodel for pore-scale analysis in
          reservoir characterization workflows.

      - name: PyFR
        url: https://github.com/PyFR/PyFR
        project_url: https://www.pyfr.org/
        license: "BSD-3-Clause"
        maturity: maturing
        python_api: native
        community: medium
        capabilities:
          - "High-order flux reconstruction"
          - "GPU acceleration (CUDA, OpenCL, HIP)"
          - "Scale-resolving simulations (DNS, LES)"
          - "Unstructured mixed-element grids"
          - "Cross-platform portability"
        relevance_to_ace: >
          GPU-accelerated high-fidelity CFD for detailed turbulence
          studies on offshore structure wake flows and vortex shedding
          analysis beyond RANS capabilities.
        integration_notes: >
          Pure Python driver with GPU backends. Gmsh mesh import
          supported. BSD license enables commercial use. Can complement
          OpenFOAM for cases requiring higher-order accuracy.

      - name: Nektar++
        url: https://gitlab.nektar.info/nektar/nektar
        project_url: https://www.nektar.info/
        license: "MIT"
        maturity: stable
        python_api: bindings
        community: medium
        capabilities:
          - "Spectral/hp element methods"
          - "Incompressible and compressible Navier-Stokes"
          - "Advection-diffusion equations"
          - "Cardiac electrophysiology"
          - "Acoustic solvers"
          - "High-order mesh generation"
        relevance_to_ace: >
          High-order spectral methods for accurate wave-structure
          interaction simulations and acoustic noise prediction from
          subsea equipment.
        integration_notes: >
          Python bindings available. NekMesh utility for high-order mesh
          generation from CAD. MIT license allows unrestricted
          integration with ACE codebase.

      - name: Basilisk
        url: https://github.com/comphy-lab/basilisk-C
        project_url: https://basilisk.fr/
        license: "GPL-3.0"
        maturity: maturing
        python_api: cli-only
        community: medium
        capabilities:
          - "Adaptive mesh refinement (AMR)"
          - "Multiphase flows with surface tension"
          - "Free-surface flows"
          - "Solid-fluid interaction"
          - "Electrohydrodynamics"
          - "Cartesian grid methods"
        relevance_to_ace: >
          AMR and free-surface capabilities ideal for wave breaking,
          sloshing in tanks, and green water loading simulations relevant
          to FPSO and platform design in digitalmodel.
        integration_notes: >
          C-based with scripting via its own language. Output in VTK
          format for Python post-processing. Successor to Gerris; well
          suited for free-surface problems that complement OpenFOAM.

  # ---------------------------------------------------------------------------
  oil_and_gas:
    description: "Oil & Gas / Petroleum Engineering"
    libraries:
      - name: OPM Flow
        url: https://github.com/OPM/opm-simulators
        project_url: https://opm-project.org/
        license: "GPL-3.0-or-later"
        maturity: stable
        python_api: bindings
        community: medium
        capabilities:
          - "Black-oil reservoir simulation"
          - "Compositional simulation"
          - "Polymer and solvent flooding"
          - "CO2 storage modeling"
          - "Eclipse deck compatibility"
          - "MPI parallel simulation"
        relevance_to_ace: >
          Eclipse-compatible reservoir simulator directly applicable to
          worldenergydata's production and reserves analysis. Enables
          reservoir simulation from BSEE/SODIR data.
        integration_notes: >
          Python bindings via opm-python. Eclipse input format compatibility
          means existing industry models work directly. ResInsight provides
          visualization. Data pipelines from worldenergydata can feed
          reservoir parameters.

      - name: ResInsight
        url: https://github.com/OPM/ResInsight
        project_url: https://resinsight.org/
        license: "GPL-3.0-or-later"
        maturity: stable
        python_api: bindings
        community: medium
        capabilities:
          - "3D reservoir model visualization"
          - "Eclipse and OPM result reading"
          - "Well log and completion visualization"
          - "Summary plot and curve plotting"
          - "Geomechanics result visualization"
          - "Python scripting interface"
        relevance_to_ace: >
          Visualization frontend for OPM reservoir results. Enables
          interactive exploration of production data from worldenergydata
          in a geospatial context.
        integration_notes: >
          Python API (rips module) for scripted post-processing. Can read
          Eclipse EGRID/INIT/UNRST files. Embeddable in analysis
          pipelines alongside worldenergydata data extraction.

      - name: MRST
        url: https://github.com/SINTEF-AppliedCompSci/MRST
        project_url: https://www.sintef.no/projectweb/mrst/
        license: "GPL-3.0-or-later"
        maturity: stable
        python_api: none
        community: medium
        capabilities:
          - "Reservoir simulation prototyping"
          - "Grid handling and processing"
          - "Multiscale methods"
          - "CO2 storage modeling"
          - "History matching"
          - "Diagnostics and flow analysis"
          - "~65 add-on modules"
        relevance_to_ace: >
          Rapid prototyping of reservoir models. Rich library of reservoir
          simulation methods applicable to worldenergydata field analysis.
          MATLAB-based but with GNU Octave compatibility.
        integration_notes: >
          MATLAB/Octave-based; no direct Python API. Can be called from
          Python via Oct2Py bridge. Results exportable to formats readable
          by pandas/xarray. Consider OPM Flow for production Python
          integration instead.

      - name: DWSIM
        url: https://github.com/DanWBR/dwsim
        project_url: https://dwsim.org/
        license: "GPL-3.0"
        maturity: stable
        python_api: none
        community: medium
        capabilities:
          - "Process simulation (steady-state and dynamic)"
          - "Thermodynamic property packages"
          - "Unit operations library"
          - "Chemical reaction modeling"
          - "PFD creation and editing"
          - "Experiment data regression"
        relevance_to_ace: >
          Chemical process simulation for topside processing, gas
          treatment, and separation systems. Relevant to production
          facility design in digitalmodel.
        integration_notes: >
          .NET/Mono based; limited direct Python integration. Can be
          driven via COM automation or CLI. Consider coupling with
          assetutilities for property calculations. Thermodynamic
          packages useful as reference data.

      - name: Whitson+
        url: https://github.com/whitson-org
        project_url: https://whitson.com/
        license: "Various (check per-repo)"
        maturity: maturing
        python_api: native
        community: small
        capabilities:
          - "PVT analysis and EOS modeling"
          - "Phase behavior calculations"
          - "Production data analysis"
          - "Rate-transient analysis"
        relevance_to_ace: >
          PVT and phase behavior tools relevant to wellstream
          characterization and flow assurance in digitalmodel's
          production engineering modules.
        integration_notes: >
          Python-native where available. Check individual repo licenses
          before integration. PVT calculations can feed into
          assetutilities fluid property modules.

  # ---------------------------------------------------------------------------
  cad_geometry:
    description: "CAD & Geometry Processing"
    libraries:
      - name: OpenCASCADE / PythonOCC
        url: https://github.com/tpaviot/pythonocc-core
        project_url: https://dev.opencascade.org/
        license: "LGPL-3.0 (PythonOCC) / LGPL-2.1 (OCCT)"
        maturity: stable
        python_api: native
        community: large
        capabilities:
          - "B-Rep solid modeling"
          - "STEP/IGES/BREP import/export"
          - "Boolean operations"
          - "Filleting, chamfering, shelling"
          - "Surface and curve modeling"
          - "Mesh visualization"
        relevance_to_ace: >
          Core geometry kernel for parametric modeling of offshore
          structures, risers, connectors, and subsea equipment in
          digitalmodel. STEP exchange enables interop with commercial CAD.
        integration_notes: >
          PythonOCC provides full Python bindings to OCCT. pip-installable
          via conda-forge. Geometry can feed directly into Gmsh for
          meshing and then to FEA solvers. LGPL allows library use
          without copyleft on application code.

      - name: FreeCAD
        url: https://github.com/FreeCAD/FreeCAD
        project_url: https://www.freecad.org/
        license: "LGPL-2.0-or-later"
        maturity: stable
        python_api: native
        community: large
        capabilities:
          - "Parametric 3D modeling"
          - "Part design and assembly"
          - "FEM workbench (CalculiX integration)"
          - "Draft and architecture tools"
          - "Spreadsheet-driven parameters"
          - "Extensive addon ecosystem"
        relevance_to_ace: >
          Full parametric CAD platform for designing offshore structures
          and equipment. FEM workbench enables quick structural checks.
          Python API allows scripted geometry generation from digitalmodel
          parameters.
        integration_notes: >
          Complete Python scripting via FreeCAD module. Can be run
          headless for batch geometry generation. Exports STEP/IGES for
          downstream FEA. Built on OpenCASCADE kernel.

      - name: CadQuery
        url: https://github.com/CadQuery/cadquery
        project_url: https://cadquery.readthedocs.io/
        license: "Apache-2.0"
        maturity: maturing
        python_api: native
        community: medium
        capabilities:
          - "Fluent API for parametric CAD"
          - "Code-first 3D modeling"
          - "STEP/STL/AMF export"
          - "Assemblies and constraints"
          - "Sketch-based modeling"
          - "Based on OpenCASCADE (OCP)"
        relevance_to_ace: >
          Code-first CAD approach aligns perfectly with digitalmodel's
          programmatic workflow. Ideal for parametric generation of
          connectors, flanges, clamps, and structural joints.
        integration_notes: >
          pip-installable. Pure Python API on top of OCP (OpenCASCADE).
          Models are Python scripts, enabling version control and
          parameterization from digitalmodel design databases. Apache
          license allows unrestricted use.

      - name: Gmsh
        url: https://gitlab.onelab.info/gmsh/gmsh
        project_url: https://gmsh.info/
        license: "GPL-2.0-or-later (with linking exception)"
        maturity: stable
        python_api: native
        community: large
        capabilities:
          - "1D/2D/3D mesh generation"
          - "CAD engine (OpenCASCADE integration)"
          - "Structured and unstructured meshing"
          - "High-order element generation"
          - "Built-in post-processing"
          - "STEP/IGES/BREP import"
        relevance_to_ace: >
          Essential meshing tool bridging CAD geometry to FEA/CFD solvers.
          Required by FEniCSx, OpenFOAM, and other solvers in the ACE
          analysis pipeline.
        integration_notes: >
          pip-installable Python API (gmsh module). Scriptable mesh
          generation from digitalmodel geometry. Outputs MSH, VTK, MED,
          and other formats. Linking exception allows use as a library
          without full GPL propagation.

      - name: Salome-Meca
        url: https://www.salome-platform.org/
        project_url: https://www.salome-platform.org/
        license: "LGPL-2.1 (Salome) / GPL-3.0 (Code_Aster)"
        maturity: stable
        python_api: native
        community: medium
        capabilities:
          - "Integrated CAD/mesh/solve platform"
          - "Geometry creation and import"
          - "Mesh generation (SMESH, Netgen, MeshGems)"
          - "Code_Aster structural solver"
          - "Code_Saturne CFD solver"
          - "Python scripting throughout"
        relevance_to_ace: >
          All-in-one platform for structural analysis workflows. Geometry
          to mesh to solve in a single environment. Relevant to complex
          offshore structure analysis in digitalmodel.
        integration_notes: >
          Full Python scripting of geometry, meshing, and solver setup.
          Can be run headless. Salome geometry interops with Gmsh and
          other meshing tools. Large learning curve but comprehensive.

      - name: Netgen/NGSolve
        url: https://github.com/NGSolve/ngsolve
        project_url: https://ngsolve.org/
        license: "LGPL-2.1 (Netgen) / LGPL-2.1 (NGSolve)"
        maturity: stable
        python_api: native
        community: medium
        capabilities:
          - "Automatic mesh generation (2D/3D)"
          - "High-order finite elements"
          - "Structural mechanics"
          - "Electromagnetics"
          - "Fluid dynamics"
          - "Coupled multi-physics"
        relevance_to_ace: >
          High-performance meshing and FEM solving with excellent Python
          integration. Applicable to electromagnetics analysis of subsea
          cables and connectors in digitalmodel.
        integration_notes: >
          pip-installable. Jupyter notebook integration for interactive
          analysis. Python-first workflow matches digitalmodel's design
          philosophy. LGPL license allows library use.

  # ---------------------------------------------------------------------------
  gis_geospatial:
    description: "GIS & Geospatial Analysis"
    libraries:
      - name: GDAL/OGR
        url: https://github.com/OSGeo/gdal
        project_url: https://gdal.org/
        license: "MIT"
        maturity: stable
        python_api: native
        community: large
        capabilities:
          - "Raster and vector data translation"
          - "200+ format support"
          - "Coordinate system transformations"
          - "Raster processing and warping"
          - "OGR vector operations"
          - "Virtual raster (VRT) format"
        relevance_to_ace: >
          Foundation for all geospatial data handling in worldenergydata.
          Essential for processing bathymetry, lease block boundaries,
          pipeline routes, and platform locations from BSEE/BOEM data.
        integration_notes: >
          Python bindings via osgeo module or rasterio/fiona wrappers.
          Underlying engine for most Python GIS libraries. Required
          dependency for geopandas, rasterio, and fiona.

      - name: GeoPandas
        url: https://github.com/geopandas/geopandas
        project_url: https://geopandas.org/
        license: "BSD-3-Clause"
        maturity: stable
        python_api: native
        community: large
        capabilities:
          - "Spatial operations on DataFrames"
          - "Geometric operations (buffer, union, intersection)"
          - "Spatial joins and overlays"
          - "File I/O (Shapefile, GeoJSON, GeoParquet)"
          - "CRS management"
          - "Integration with matplotlib"
        relevance_to_ace: >
          Primary tool for spatial analysis of well locations, lease
          blocks, pipeline corridors, and platform positions in
          worldenergydata. Enables spatial queries on BSEE/BOEM datasets.
        integration_notes: >
          Extends pandas with geometry column. Direct integration with
          worldenergydata DataFrames. Spatial indexing via rtree/pygeos.
          Outputs to GeoParquet for efficient storage.

      - name: Rasterio
        url: https://github.com/rasterio/rasterio
        project_url: https://rasterio.readthedocs.io/
        license: "BSD-3-Clause"
        maturity: stable
        python_api: native
        community: large
        capabilities:
          - "Raster data reading and writing"
          - "Windowed reading for large files"
          - "Coordinate reference system handling"
          - "Raster reprojection and resampling"
          - "Masking and clipping"
          - "Cloud-optimized GeoTIFF support"
        relevance_to_ace: >
          Processing bathymetry rasters, seabed survey data, and
          environmental data layers for offshore site characterization
          in worldenergydata.
        integration_notes: >
          Pythonic wrapper over GDAL raster functionality. NumPy array
          interface for raster data. Integrates with xarray via
          rioxarray extension for multi-dimensional analysis.

      - name: Shapely
        url: https://github.com/shapely/shapely
        project_url: https://shapely.readthedocs.io/
        license: "BSD-3-Clause"
        maturity: stable
        python_api: native
        community: large
        capabilities:
          - "Geometric object creation and manipulation"
          - "Spatial predicates (contains, intersects, etc.)"
          - "Geometric operations (buffer, convex hull)"
          - "Linear referencing"
          - "Prepared geometry for performance"
          - "STRtree spatial index"
        relevance_to_ace: >
          Core geometry library underpinning GeoPandas. Used for pipeline
          route geometry, lease block boundary analysis, and exclusion
          zone calculations in worldenergydata.
        integration_notes: >
          Based on GEOS library. Direct NumPy integration via vectorized
          operations. Foundation geometry type for all GIS operations in
          the ACE ecosystem.

      - name: Fiona
        url: https://github.com/Toblerity/Fiona
        project_url: https://fiona.readthedocs.io/
        license: "BSD-3-Clause"
        maturity: stable
        python_api: native
        community: medium
        capabilities:
          - "Vector data reading and writing"
          - "OGR format support via GDAL"
          - "Schema inspection"
          - "Streaming record access"
          - "CRS handling"
        relevance_to_ace: >
          Low-level vector I/O for Shapefile, GeoJSON, GeoPackage
          formats. Backend for GeoPandas file operations. Relevant to
          worldenergydata's spatial data pipelines.
        integration_notes: >
