          - "Hydrodynamic coefficient visualization"
          - "Pre/post-processing for BEM solvers"
        relevance_to_ace: >
          Bridges multiple BEM solvers by standardizing output format.
          Useful for comparing Capytaine/HAMS results with commercial
          solver outputs in digitalmodel validation workflows.
        integration_notes: >
          Python-based. Note: requires Python 2.7 (legacy project).
          Consider using Capytaine's built-in I/O or BEMRosetta as
          more actively maintained alternatives for BEM data handling.

      - name: WEC-Sim
        url: https://github.com/WEC-Sim/WEC-Sim
