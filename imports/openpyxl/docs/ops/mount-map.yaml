# ── Hardcoded path audit ────────────────────────────────────────────────────
# Files with hardcoded /mnt/ paths that should migrate to env vars

hardcoded_path_findings:
  - category: venv shebangs (low risk, auto-generated)
    pattern: "#!/mnt/local-analysis/workspace-hub/digitalmodel/.venv/bin/python"
    files: digitalmodel/.venv/bin/*.py
    action: none (auto-generated by pip)

  - category: legacy /mnt/github references (medium risk)
    pattern: '/mnt/github/workspace-hub'
    files:
      - scripts/automation/agent_orchestrator.sh
      - scripts/automation/deploy_orchestration_all_repos.sh
      - scripts/automation/gate_pass_review.sh
      - scripts/automation/install_factory_all_repos.sh
      - scripts/automation/install_factory_enhanced.sh
      - scripts/automation/setup_agent_links.sh
      - scripts/automation/setup_claude_memory_all_repos.sh
      - scripts/automation/sync_agent_configs.sh
      - scripts/automation/update_ai_agents_daily.sh
      - scripts/coordination/git/check_trunk_status.sh
      - scripts/coordination/git/push_all_repos.sh
      - scripts/coordination/git/quick_trunk_cleanup.sh
      - scripts/coordination/git/setup-trunk-flow.sh
      - scripts/coordination/git/sync_all_repos.sh
      - scripts/coordination/git/sync_and_commit_all.sh
      - scripts/coordination/git/sync_orchestration_all_repos.sh
    action: migrate to WORKSPACE_HUB_ROOT or $(git rev-parse --show-toplevel)

  - category: test fixtures with absolute paths (low risk)
    pattern: '/mnt/local-analysis/workspace-hub/digitalmodel/...'
    files: digitalmodel/tests/asset_integrity/test_data/**/*.yml
    action: consider relative paths or REPO_ROOT variable

  - category: codex agent configs (medium risk)
    pattern: '/mnt/local-analysis/workspace-hub/.codex/...'
    files: .codex/agents/*.toml
    action: migrate to WORKSPACE_HUB_ROOT

  - category: capytaine env paths (low risk)
    pattern: '/mnt/local-analysis/capytaine-env/...'
    files: digitalmodel/tests/hydrodynamics/capytaine/test_*_benchmark.py
    action: migrate to CAPYTAINE_ENV var

  - category: mounted-source-registry /mnt/ace references (expected)
    pattern: '/mnt/ace/...'
    files: data/document-index/mounted-source-registry.yaml
    action: references ace-linux-1 local paths; correct for that host context

# ── Canonical layout convention (#1544) ─────────────────────────────────────
# All data on the ace drive should follow this structure.
# See docs/ops/drive-layout-migration.yaml for the full migration plan.

canonical_layout:
  convention: "${ACE_DATA_ROOT}/<repo-name>/<domain>/..."
  env_var: ACE_DATA_ROOT
  default: /mnt/ace
  remote_mount: /mnt/remote/ace-linux-1/ace
  rules:
    - "Top level = GitHub repo name (workspace-hub, digitalmodel, capytaine, etc.)"
    - "Second level = domain or functional area"
    - "Scripts must use ${ACE_DATA_ROOT:-/mnt/ace} — never hardcode the mount prefix"
    - "Remote hosts mount the same tree, so relative paths below ACE_DATA_ROOT are portable"
  already_aligned:
    - digitalmodel
    - capytaine
    - HAMS
    - MoorDyn
    - MoorPy
    - openfast
    - WEC-Sim
    - aceengineer-admin
    - saipem
    - 2H
    - doris
    - frontierdeepwater
    - seanation
    - worldenergydata
    - rock-oil-field
    - gmsh
    - opm-common
    - 0_mrv
  needs_restructuring:
    - current: O&G-Standards
      proposed: workspace-hub/standards/og/
    - current: docs
      proposed: workspace-hub/project-docs/
    - current: data
      proposed: workspace-hub/data/
    - current: Production
      proposed: workspace-hub/production/
    - current: umbilical
      proposed: workspace-hub/umbilical/
    - current: client_projects
      proposed: workspace-hub/client-projects/
    - current: scripts
      proposed: workspace-hub/scripts/
  migration_plan_ref: docs/ops/drive-layout-migration.yaml
