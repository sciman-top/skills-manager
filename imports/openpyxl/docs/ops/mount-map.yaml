# ── Path alias mapping ───────────────────────────────────────────────────────
# These aliases appear in code and configs. Map them to canonical mount points.

path_aliases:
  /mnt/ace:
    canonical_on: ace-linux-1
    maps_to_on_ace_linux_2: /mnt/remote/ace-linux-1/ace
    used_in:
      - data/document-index/mounted-source-registry.yaml
      - digitalmodel/scripts/python/digitalmodel/index_assets.py
      - digitalmodel/tests (literature references)

  /mnt/ace-data:
    canonical_on: ace-linux-1
    note: symlink to /mnt/ace on ace-linux-1
    maps_to_on_ace_linux_2: /mnt/remote/ace-linux-1/ace

  /mnt/github:
    canonical_on: ace-linux-1 (legacy)
    note: >
      Legacy path used in scripts/automation/ and scripts/coordination/git/.
      References /mnt/github/workspace-hub, /mnt/github/github, etc.
      Should be migrated to use WORKSPACE_HUB_ROOT or REPO_ROOT.
    used_in:
      - scripts/automation/*.sh (6+ files)
      - scripts/coordination/git/*.sh (6+ files)

