# mount-map.yaml — NFS/SSHFS mount inventory for workspace-hub infrastructure
# Generated: 2026-03-31
# Issue: #1543
#
# This machine: ace-linux-2
# Topology: ace-linux-1 (dev-primary), ace-linux-2 (dev-secondary)

schema_version: "1.0.0"
generated: "2026-03-31"
current_host: ace-linux-2

# ── Discovered mounts (from `mount` and `df -hT`) ────────────────────────────

mounts:
  - id: local_analysis
    mount_point: /mnt/local-analysis
    source: /dev/sda2
    fs_type: fuseblk (NTFS)
    size: 932G
    used: 47G
    scope: local disk on ace-linux-2
    description: >
      Local analysis drive. Contains workspace-hub checkout, Python virtual
      environments (capytaine-env, marker-env, fluids-env, sectionprops-env),
      and cloud sync folders (Dropbox, OneDrive).
    key_subdirectories:
      - workspace-hub          # main repo checkout
      - capytaine-env          # Capytaine 2.3.1, Python 3.12
      - marker-env             # marker 1.10.2
      - fluids-env             # fluids/piping design
      - sectionprops-env       # section properties
    env_var: LOCAL_ANALYSIS_ROOT

  - id: ace_nfs
    mount_point: /mnt/remote/ace-linux-1/ace
    source: ace-linux-1:/mnt/ace
    fs_type: nfs4
    nfs_version: "4.2"
    size: 7.3T
    used: 4.6T
    scope: NFS from ace-linux-1 (dev-primary)
    description: >
      Primary data drive on ace-linux-1. Standards libraries, project archives,
      simulation tools (capytaine, HAMS, MoorDyn, OpenFAST), and the
      document-intelligence corpus.
    key_subdirectories:
      - docs                   # project documents, standards
      - "O&G-Standards"        # oil & gas standards library
      - data/document-index    # document-intelligence index (remote copy)
      - digitalmodel           # digital model project archives
      - Production             # production data
      - capytaine              # capytaine mesh/result data
      - HAMS                   # HAMS solver data
      - MoorDyn                # mooring dynamics
      - MoorPy                 # mooring analysis
      - openfast               # OpenFAST models
      - client_projects        # client project archives
    env_var: ACE_DATA_ROOT
    aliases:
      - /mnt/ace               # used in mounted-source-registry.yaml (ace-linux-1 local path)
      - /mnt/ace-data          # symlink on ace-linux-1

  - id: ace_sshfs
    mount_point: /mnt/remote/ace-linux-1/local-analysis
    source: vamsee@ace-linux-1:/mnt/local-analysis
    fs_type: fuse.sshfs
    size: 932G
    used: 69G
    scope: SSHFS from ace-linux-1
    description: >
      ace-linux-1's local-analysis drive mounted via SSHFS. Provides access
      to the workspace-hub checkout on ace-linux-1 and its venvs. Configured
      with systemd automount (idle-timeout=60s, mount-timeout=30s).
    key_subdirectories:
      - workspace-hub          # ace-linux-1's repo checkout
    env_var: REMOTE_LOCAL_ANALYSIS_ROOT

  - id: dde_drive
    mount_point: /mnt/dde
    source: local/USB drive
    fs_type: unknown (likely NTFS)
    scope: local on ace-linux-2
    description: >
      External/secondary drive containing legacy engineering documents,
      Orcaflex models, and reference literature. Not NFS-shared.
    key_subdirectories:
      - documents
      - dropbox_contents
      - Literature
      - Orcaflex
      - "0000 O&G"            # legacy O&G documents
      - g-drive
      - o-drive
    env_var: DDE_ROOT

  - id: workspace_hub_nfs
    mount_point: /mnt/workspace-hub
    source: "symlink or bind mount to /mnt/local-analysis/workspace-hub (or NFS on ace-linux-1)"
    fs_type: varies by host
    scope: convenience alias
    description: >
      Quick-access path to the workspace-hub repo. On ace-linux-2 this is
      a bind/symlink to /mnt/local-analysis/workspace-hub. On ace-linux-1
      it may be an NFS mount from ace-linux-2.
    env_var: WORKSPACE_HUB_ROOT

# ── Cross-machine mount map ──────────────────────────────────────────────────
#
# Scripts in check-network-mounts.sh define these expected mounts per host:
#
#   dev-primary (ace-linux-1):
#     /mnt/remote/ace-linux-2/local-analysis  (SSHFS from ace-linux-2)
#     /mnt/remote/ace-linux-2/dde             (SSHFS from ace-linux-2)
#
#   ace-linux-2:
#     /mnt/workspace-hub                       (NFS/bind from dev-primary)
#     /mnt/remote/dev-primary/local-analysis   (SSHFS from dev-primary)
