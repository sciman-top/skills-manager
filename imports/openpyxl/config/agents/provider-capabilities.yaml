# Provider Capability Profiles
# Structured profiles for each AI provider used in the workspace-hub ecosystem.
# Source of truth for model IDs: config/agents/model-registry.yaml
# Source of truth for strengths/roles: config/agents/behavior-contract.yaml
#
# This file aggregates capability metadata in one place so that routing
# scripts, documentation, and assessment tools can reference it without
# parsing multiple sources.

version: 1.1.0
last_updated: "2026-02-24"

# Radar visualization: config/ai-tools/agent-capability-radar.html
# Scores data: config/ai-tools/agent-capability-scores.yaml
# Regenerate: uv run --no-project python scripts/ai/generate-agent-radar.py
#
# Strategy note (updated 2026-04-03 after observed-behavior audit)
# - Claude: orchestrator + primary executor across most active workflows
# - Codex: cross-review hard gate and bounded second-lane implementation helper
# - Gemini: third review lane and overflow/large-context option, but not the observed primary research engine
# - Hermes: documentation, data analysis, skill management, and agentic orchestration specialist

providers:
  claude:
    display_name: "Anthropic Claude"
    model_ids:
      primary: "claude-opus-4-6"
      balanced: "claude-sonnet-4-6"  # Updated 2026-02-24: Sonnet 4.6 preferred
      fast: "claude-haiku-4-5"      # use latest
    context_window:
      primary: 200000
      balanced: 200000
      fast: 200000
    strengths:
      - multi-file architecture
      - orchestration and planning
      - complex integration across modules
      - sensitive data handling
      - long-context reasoning
      - code review and cross-review
    cost_tier: high
    primary_use_cases:
      - "Multi-module design and architecture (Route C)"
      - "Session orchestration and task delegation"
      - "Cross-review verdicts on complex diffs"
      - "Sensitive or compliance-gated work"
    horizon_2026_h1:
      trajectory: improving_rapidly
      gap_to_close: "context window (200K vs 1M Gemini); closing by mid-2026 expected"
      strategy_role: orchestrator_and_executor
      consolidation_candidate: false  # already primary; not at risk

  codex:
    display_name: "OpenAI Codex CLI"
    model_ids:
      primary: "codex-cli"
    context_window:
      primary: 200000
    strengths:
      - adversarial code review
      - bounded implementation support
      - focused test writing when explicitly assigned
      - refactoring and cleanup
      - configuration edits
    cost_tier: low
    primary_use_cases:
      - "Cross-review hard gate on plans and diffs"
      - "Bounded implementation tasks when explicitly routed"
      - "Focused test writing and cleanup work"
      - "Alternative implementation perspective at low cost"
    horizon_2026_h1:
      trajectory: stable
      unique_value: "Independent cross-review perspective; budget cost tier (o4-mini)"
      strategy_role: cross_review_hard_gate
      consolidation_candidate: true
      consolidation_trigger: "Codex cross-review verdicts consistently match Claude Sonnet AND cost savings < overhead"

  gemini:
    display_name: "Google Gemini"
    model_ids:
      primary: "gemini-2.5-pro"
      fast: "gemini-2.5-flash"
    context_window:
      primary: 1000000
      fast: 1000000
    strengths:
      - independent third-lane review
      - large-context overflow analysis
      - content drafting when explicitly routed
      - broad synthesis as a supplementary reviewer
    cost_tier: medium
    primary_use_cases:
      - "Third adversarial review lane"
      - "Large-context overflow analysis when routed"
      - "Supplementary synthesis and documentation"
      - "Fallback research pass when Hermes/Claude are saturated"
    horizon_2026_h1:
      trajectory: improving_rapidly
      unique_value: "1M token context window — still useful as overflow capacity"
      strategy_role: third_review_lane
      consolidation_candidate: true
      consolidation_trigger: "Claude context window reaches 1M tokens AND Gemini adds no unique capability"

  hermes:
    display_name: "Hermes Agent"
    model_ids:
      primary: "gpt-5.4"
    context_window:
      primary: 200000
    strengths:
      - documentation and reporting
      - data analysis and transformation
      - skill creation and maintenance
      - agent orchestration and delegation
      - cross-repo synthesis
    cost_tier: medium
    primary_use_cases:
      - "Documentation and report generation"
      - "Data analysis and structured transformations"
      - "Skill management and memory-driven maintenance"
      - "Parallel delegation and orchestration workflows"
    horizon_2026_h1:
      trajectory: improving_rapidly
      unique_value: "Strong skill tooling, delegation, and document-heavy workflow support"
      strategy_role: documentation_data_skill_specialist
      consolidation_candidate: false

  openai:
    display_name: "OpenAI GPT"
    model_ids:
      primary: "gpt-4.1"
      fast: "gpt-4.1-mini"
    context_window:
      primary: 1000000
      fast: 1000000
    strengths:
      - general-purpose code generation
      - structured data extraction
      - API integration tasks
      - multi-language support
    cost_tier: medium
    primary_use_cases:
      - "General code generation when primary providers are at capacity"
      - "Structured data parsing and transformation"
      - "Alternative cross-review perspective"
