      >> $WORKSPACE_HUB/logs/quality/harness-lean-out.log 2>&1
    log: logs/quality/harness-lean-out.log
    is_claude_task: false
    description: Weekly audit (Monday 03:30) of CLAUDE.md, AGENTS.md, memory, rules for bloat; flags line budget violations, stale memory, promotion candidates.

  - id: skills-curation
    label: Skills curation
