    log: logs/maintenance/skills-curation-*.log
    is_claude_task: true
    description: Weekly skills curation (Monday 04:00); archives stale skills, validates frontmatter.

  - id: provider-session-ecosystem-audit
    label: Provider session ecosystem audit refresh
    schedule: "15 4 * * 1"
    machines: [dev-primary, ace-linux-1]
    requires: [bash, python3, uv]
    prefer: dev-primary
