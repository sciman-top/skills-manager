      writes batch reports to .claude/state/gemini-batch/. Issue #1961.

  - id: ai-credit-utilization-weekly
    label: Weekly AI credit utilization report
    schedule: "0 23 * * 0"
    machines: [dev-primary, ace-linux-1]
    requires: [python3, uv]
    prefer: dev-primary
    command: >-
      PATH=$HOME/.local/bin:$PATH;
      cd $WORKSPACE_HUB &&
