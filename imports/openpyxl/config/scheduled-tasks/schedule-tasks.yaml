  - id: provider-utilization-refresh
    label: Provider quota snapshot + utilization refresh
    schedule: "20 */4 * * *"
    machines: [dev-primary, ace-linux-1]
    requires: [bash, python3, uv]
    prefer: dev-primary
    command: >-
      PATH=$HOME/.local/bin:$PATH;
      cd $WORKSPACE_HUB &&
      bash scripts/cron/provider-utilization-refresh.sh
    log: logs/quality/provider-utilization-refresh-*.log
    is_claude_task: false
    description: Refreshes quota snapshots and regenerates weekly provider utilization artifacts every 4 hours.

  - id: weekly-hermes-parity-review
    label: Weekly Hermes cross-machine parity review
    schedule: "30 4 * * 1"
    machines: [dev-primary, ace-linux-1]
    requires: [bash, git]
    prefer: dev-primary
    command: >-
      cd $WORKSPACE_HUB &&
      bash scripts/cron/weekly-hermes-parity-review.sh
      >> $WORKSPACE_HUB/logs/weekly-parity/cron-$(date +\%Y-\%m-\%d).log 2>&1
    log: logs/weekly-parity/cron-*.log
    is_claude_task: false
    description: >-
      Weekly Monday 04:30 UTC — Hermes cross-machine parity review. Collects
      evidence from all workstations (local probes, SSH, bridge artifacts),
      classifies each as pass/drift/unreachable/blocked, writes dated artifact
      to logs/weekly-parity/. Issues #2239, #2089, #1583.

  - id: claude-plugin-audit
    label: Claude plugin weekly audit
    schedule: "45 3 * * 0"
    machines: [dev-primary, ace-linux-1]
    requires: [bash, claude]
    command: >-
      cd $WORKSPACE_HUB &&
      timeout 120 bash scripts/maintenance/claude-plugin-audit.sh
      >> $WORKSPACE_HUB/logs/maintenance/claude-plugin-audit-$(date +\%Y\%m\%d).log 2>&1
    log: logs/maintenance/claude-plugin-audit-*.log
    is_claude_task: false
    description: Weekly audit (Sunday 03:45) of installed Claude plugins — version currency, skill overlaps, deprecations.

  - id: notification-purge
    label: Notification log 7-day retention
    schedule: "30 4 * * *"
    machines: [dev-primary, ace-linux-1]
    requires: [bash]
    command: >-
      cd $WORKSPACE_HUB &&
      find logs/notifications/ -name "*.jsonl" -mtime +7 -delete 2>/dev/null || true
    log: null
    is_claude_task: false
    description: Daily purge of notification JSONL files older than 7 days.

  - id: session-analysis
    label: Morning session signal analysis
    schedule: "0 3 * * *"
    machines: [dev-primary, ace-linux-1]
    requires: [python3, bash, git]
    command: >-
      cd $WORKSPACE_HUB &&
      bash scripts/analysis/session-analysis.sh
      >> $WORKSPACE_HUB/.claude/state/session-analysis/cron.log 2>&1
    log: .claude/state/session-analysis/cron.log
    is_claude_task: false
    description: Daily 3AM analysis of previous day's session signals; produces skill scores and gap reports.

  - id: agent-memory-backup
    label: All-agent memory backup to ace-linux-2
    schedule: "0 5 * * *"
    machines: [dev-primary, ace-linux-1]
    requires: [bash]
    prefer: dev-primary
    command: >-
      cd $WORKSPACE_HUB &&
      bash scripts/cron/memory-backup.sh
      >> $WORKSPACE_HUB/logs/maintenance/claude-memory-backup-$(date +\%Y\%m\%d).log 2>&1
    log: logs/maintenance/claude-memory-backup-*.log
    is_claude_task: false
    description: Daily backup of all agent state (Claude, Hermes, Codex, Gemini) to ace-linux-2. Covers project memory, sessions, rules, and state files.

  - id: memory-health-check
    label: Memory quality health check + drift alert
    schedule: "50 5 * * *"
    machines: [dev-primary, ace-linux-1]
    requires: [python3, uv, git]
    prefer: dev-primary
    command: >-
      cd $WORKSPACE_HUB &&
      uv run --no-project python scripts/memory/eval-memory-quality.py
      --memory-root .claude/memory/ --format md
      --check-paths
      >> $WORKSPACE_HUB/logs/quality/memory-health-$(date +\%Y\%m\%d).md 2>&1
    log: logs/quality/memory-health-*.md
    is_claude_task: false
    description: Daily memory quality scan — checks signal density, stale paths, dedup candidates, and headroom. Fails if quality drops below threshold. Complements agent-memory-backup with quality verification.


  - id: cron-health
    label: Cron health check
    schedule: "45 5 * * *"
    machines: [dev-primary, ace-linux-1]
    requires: [bash, python3, uv]
    command: >-
      cd $WORKSPACE_HUB &&
      bash scripts/monitoring/cron-health-check.sh
      >> $WORKSPACE_HUB/logs/quality/cron-health-$(date +\%Y\%m\%d).log 2>&1
    log: logs/quality/cron-health-*.log
    is_claude_task: false
    description: Daily 05:45 UTC health check of all cron jobs; reads schedule-tasks.yaml, flags stale/missing/erroring runs, writes JSON report to .claude/state/cron-health/.

  - id: daily-today
    label: Daily productivity summary
    schedule: "0 6 * * *"
    machines: [dev-primary, ace-linux-1]
    requires: [python3, bash, git]
    command: >-
      PATH=$HOME/.local/bin:$PATH;
      cd $WORKSPACE_HUB &&
      bash scripts/productivity/daily_today.sh
      >> $WORKSPACE_HUB/logs/daily/cron.log 2>&1
    log: logs/daily/cron.log
    is_claude_task: false
    description: Daily productivity review; generates logs/daily/YYYY-MM-DD.md at 6 AM.

  - id: review-audit
    label: Daily review compliance audit
    schedule: "30 6 * * *"
    machines: [ace-linux-1]
    requires: [bash, git, gh]
    command: >-
      cd $WORKSPACE_HUB &&
      bash scripts/maintenance/review-audit.sh
      >> $WORKSPACE_HUB/logs/maintenance/review-audit-$(date +\%Y\%m\%d).log 2>&1
    log: logs/maintenance/review-audit-*.log
    is_claude_task: false
    description: Daily audit (06:30) of commit review compliance; creates GitHub issue if below 80%.

  # ── dev-primary + dev-secondary: shared ─────────────────────────────────────

  - id: repository-sync
    label: Repository sync
    schedule: "0 */4 * * *"
    machines: [dev-primary, ace-linux-1, dev-secondary, ace-linux-2]
    requires: [bash, git]
    command: >-
      cd $WORKSPACE_HUB &&
      bash scripts/cron-repository-sync.sh
      >> $LOG 2>&1
    log: logs/repository-sync-*.log
    is_claude_task: false
    description: Pull from remotes, push derived state; every 4 hours.
    # NOTE: $LOG is set by setup-cron.sh per machine variant

  # ── Windows: contribute-minimal ──────────────────────────────────────────

  - id: architecture-scan
    label: Weekly architecture scanner
    schedule: "0 2 * * 0"
    machines: [dev-primary, ace-linux-1]
    requires: [python3, uv, git]
    prefer: dev-primary
    command: >-
      PATH=$HOME/.local/bin:$PATH;
      cd $WORKSPACE_HUB &&
      bash scripts/cron/architecture-scan-weekly.sh
      >> $WORKSPACE_HUB/logs/quality/architecture-scan-$(date +\%Y\%m\%d).log 2>&1
    log: logs/quality/architecture-scan-*.log
    is_claude_task: false
    description: Weekly architecture scan (Sunday 02:00 UTC); runs scanner, commits updated reports, pushes.

  - id: staleness-scan
    label: Weekly doc staleness scanner
    schedule: "0 3 * * 0"
    machines: [dev-primary, ace-linux-1]
    requires: [python3, uv, git]
    prefer: dev-primary
    command: >-
      PATH=$HOME/.local/bin:$PATH;
      cd $WORKSPACE_HUB &&
      bash scripts/cron/staleness-scan-weekly.sh
      >> $WORKSPACE_HUB/logs/quality/staleness-scan-$(date +\%Y\%m\%d).log 2>&1
    log: logs/quality/staleness-scan-*.log
    is_claude_task: false
    description: Weekly doc staleness scan (Sunday 03:00 UTC); runs scanner, commits freshness dashboard, pushes.

  # ── Windows: contribute-minimal ──────────────────────────────────────────

  - id: win-repository-sync
    label: Repository sync (Windows)
    schedule: "every 4 hours"
    machines: [licensed-win-1, licensed-win-2]
    requires: [bash, git]
    scheduler: windows-task-scheduler
    command: >-
      bash.exe -c "cd /path/to/workspace-hub && bash scripts/cron-repository-sync.sh"
    log: null
    is_claude_task: false
    description: Windows Task Scheduler — repo sync every 4 hours via Git Bash.

  # ── GTM / Business Development ──────────────────────────────────────────

  - id: gtm-job-market-scan
    label: Weekly GTM job market scan refresh
    schedule: "0 5 * * 1"
    machines: [dev-primary, ace-linux-1]
    requires: [python3, git]
    prefer: dev-primary
    command: >-
      PATH=$HOME/.local/bin:$HOME/miniforge3/bin:$PATH;
      cd $WORKSPACE_HUB &&
      bash scripts/gtm/weekly-scan-refresh.sh
      >> $WORKSPACE_HUB/logs/gtm/scan-$(date +\%Y\%m\%d).log 2>&1
    log: logs/gtm/scan-*.log
    is_claude_task: false
    description: >-
      Weekly Monday 5AM UTC — scans LinkedIn, Indeed, Rigzone + 30 company
      career pages for 22 engineering keywords. Tracks new vs returning
      postings, generates dashboard, priority targets, trend report.
      Commits results to main. Related: #1671, #1670, #1669.

  # ── Windows machines ───────────────────────────────────────────────────

  # ── Solver Queue ────────────────────────────────────────────────────────

  - id: solver-watch-results
    label: Solver queue watch-results (every 4h)
    schedule: "0 */4 * * *"
    machines: [ace-linux-1]
    requires: [bash, python3, git]
    prefer: ace-linux-1
    command: >-
      cd $WORKSPACE_HUB &&
      bash scripts/solver/watch-results.sh --once
      >> $WORKSPACE_HUB/logs/solver/watch-results-$(date +\%Y\%m\%d).log 2>&1
    log: logs/solver/watch-results-*.log
    is_claude_task: false
    description: >-
      Every 4 hours — poll queue/completed/ for new results, run post-process-hook.py,
      append metrics to data/solver-results-log.jsonl. Issue #1648.

  - id: solver-dashboard
    label: Solver queue dashboard regeneration (daily 05:00)
    schedule: "0 5 * * *"
    machines: [ace-linux-1]
    requires: [python3, uv, git]
    prefer: ace-linux-1
    command: >-
      PATH=$HOME/.local/bin:$PATH;
      cd $WORKSPACE_HUB &&
      bash scripts/cron/solver-dashboard-daily.sh
      >> $WORKSPACE_HUB/logs/solver/dashboard-$(date +\%Y\%m\%d).log 2>&1
    log: logs/solver/dashboard-*.log
    is_claude_task: false
    description: >-
      Daily 05:00 UTC — regenerate docs/solver/queue-dashboard.md from
      data/solver-results-log.jsonl. Auto-commits if changed. Issue #1648.

  - id: win-session-state-commit
    label: Session state commit (Windows)
    schedule: "daily 03:00"
    machines: [licensed-win-1, licensed-win-2]
    requires: [bash, git]
    scheduler: windows-task-scheduler
    command: >-
      bash.exe -c "cd /path/to/workspace-hub &&
      bash scripts/cron/win-session-state-commit.sh"
    log: null
    is_claude_task: false
    description: Windows Task Scheduler — daily commit of session-end state.

  - id: gemini-nightly-batch
    label: Gemini nightly batch processor
    schedule: "0 23 * * *"
    machines: [dev-primary, ace-linux-1]
    requires: [python3, uv, gh]
    prefer: dev-primary
    command: >-
      PATH=$HOME/.local/bin:$PATH;
      cd $WORKSPACE_HUB &&
      bash scripts/cron/gemini-nightly-batch.sh
      >> $WORKSPACE_HUB/logs/gemini/$(date +\%Y-\%m-\%d).log 2>&1
    log: logs/gemini/*.log
    is_claude_task: false
