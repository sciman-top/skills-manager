    log: logs/ai/credit-utilization-*.log
    is_claude_task: false
    description: >-
      Weekly Sunday 23:00 UTC — generate AI credit utilization report across
      all providers (Claude, Codex, Gemini, Copilot). Alerts on underutilization.
      Issue #1855.

  - id: queue-refresh-weekly
    label: Weekly agent work queue refresh
    schedule: "30 22 * * 0"
    machines: [dev-primary, ace-linux-1]
    requires: [python3, uv, gh, git]
    prefer: dev-primary
    command: >-
      PATH=$HOME/.local/bin:$PATH;
      cd $WORKSPACE_HUB &&
      bash scripts/cron/queue-refresh-weekly.sh
      >> $WORKSPACE_HUB/logs/queue-refresh/$(date +\%Y-\%m-\%d).log 2>&1
    log: logs/queue-refresh/*.log
    is_claude_task: false
    description: >-
      Weekly Sunday 22:30 UTC — regenerate notes/agent-work-queue.md from
      live GitHub label queries. Auto-commits and pushes so Monday's overnight
      batch has a fresh queue. Staggered 30 min before ai-credit-utilization
      and gemini-nightly-batch to avoid contention. Issue #2049.

  # ── Compliance Monitoring (#2031) ──────────────────────────────────────────

  - id: compliance-daily
    label: Daily compliance monitoring with alerts
    schedule: "45 6 * * *"
    machines: [dev-primary, ace-linux-1]
    prefer: dev-primary
    requires: [bash, git, gh]
    command: >-
      cd $WORKSPACE_HUB &&
      bash scripts/enforcement/compliance-cron.sh
      >> $WORKSPACE_HUB/logs/compliance/daily-$(date +\%Y\%m\%d).log 2>&1
    log: logs/compliance/daily-*.log
    is_claude_task: false
    description: >-
      Daily 06:45 UTC — runs compliance-dashboard.sh, parses compliance rate,
      creates GitHub issues when below thresholds (50% high, 30% critical).
      Deduplicates alerts per ISO week. Issue #2031.

  - id: compliance-weekly-report
    label: Weekly compliance summary report
    schedule: "0 7 * * 1"
    machines: [dev-primary, ace-linux-1]
    prefer: dev-primary
    requires: [bash, git, gh]
    command: >-
      cd $WORKSPACE_HUB &&
      bash scripts/enforcement/compliance-weekly-report.sh
      >> $WORKSPACE_HUB/logs/compliance/weekly-$(date +\%Y\%m\%d).log 2>&1
    log: logs/compliance/weekly-*.log
    is_claude_task: false
    description: >-
      Monday 07:00 UTC — aggregates 7 days of daily compliance logs, calculates
      week-over-week trend, lists top unreviewed commits, writes markdown report
      to docs/reports/compliance-weekly-YYYYMMDD.md. Issue #2031.

  # ── Knowledge / Wiki ──────────────────────────────────────────────────────

  - id: wiki-ingest-nightly
    label: Engineering wiki incremental ingest
    schedule: "15 2 * * *"
    machines: [dev-primary, ace-linux-1]
    requires: [python3, uv, git, gh]
    prefer: dev-primary
    command: >-
      PATH=$HOME/.local/bin:$PATH;
      cd $WORKSPACE_HUB &&
      bash scripts/knowledge/wiki-ingest-cron.sh
      >> $WORKSPACE_HUB/logs/wiki-ingest/ingest-$(date +\%Y\%m\%d).log 2>&1
