# schedule-tasks.yaml — Single source of truth for all scheduled tasks.
# Read by: scripts/cron/setup-cron.sh, scripts/cron/validate-schedule.py,
#          scripts/operations/workstation-dispatch.sh
# HARD RULE: all cron/task-scheduler entries must be declared here.
# Do NOT add entries directly to crontab or Windows Task Scheduler.
#
# Fields:
#   machines:  explicit machine list (used by cron to decide where to install)
#   requires:  capability list (used by dispatcher to find best-fit machine)
#   prefer:    optional machine hint for dispatcher when multiple match

tasks:
  # ── dev-primary: full variant ─────────────────────────────────────────────

  - id: benchmark-regression
    label: Performance benchmark regression check
    schedule: "30 1 * * *"
    machines: [dev-primary, ace-linux-1]
    requires: [python3, uv, git]
    prefer: dev-primary
    command: >-
      PATH=$HOME/.local/bin:$PATH;
      cd $WORKSPACE_HUB &&
      bash scripts/testing/run-benchmarks.sh
      >> $WORKSPACE_HUB/logs/quality/benchmark-$(date +\%Y\%m\%d).log 2>&1
    log: logs/quality/benchmark-*.log
    is_claude_task: false
    description: Nightly benchmark run; exits 1 on >20% regression vs committed baseline.

  - id: gsd-researcher
    label: Nightly GSD domain researcher
    schedule: "35 1 * * *"
    machines: [dev-primary, ace-linux-1]
    requires: [claude, python3, uv]
    prefer: dev-primary
    command: >-
      PATH=$HOME/.local/bin:$PATH;
      cd $WORKSPACE_HUB &&
      bash scripts/cron/gsd-researcher-nightly.sh
      >> $WORKSPACE_HUB/logs/research/$(date +\%Y-\%m-\%d).log 2>&1
    log: logs/research/*.log
    is_claude_task: true
    description: Weekday domain research rotating standards/python-ecosystem/ai-tooling/competitor-market; Friday synthesis. Sat/Sun off.

  - id: research-staleness
    label: Research artifact staleness check
    schedule: "0 6 * * *"
    machines: [dev-primary, ace-linux-1]
    requires: [bash]
    command: >-
      cd $WORKSPACE_HUB &&
      bash scripts/cron/research-staleness-check.sh
      >> $WORKSPACE_HUB/logs/research/staleness-$(date +\%Y-\%m-\%d).log 2>&1
    log: logs/research/staleness-*.log
    is_claude_task: false
    description: Daily 06:00 UTC staleness check; alerts via notify.sh if no research artifact in 60h.

  - id: dep-health
    label: Dependency health check
    schedule: "0 1 * * *"
    machines: [dev-primary, ace-linux-1]
    requires: [python3, uv, git]
    command: >-
      cd $WORKSPACE_HUB &&
      bash scripts/quality/dep-health.sh
      >> $WORKSPACE_HUB/logs/quality/dep-health-cron.log 2>&1
    log: logs/quality/dep-health-cron.log
    is_claude_task: false
    description: Nightly uv.lock freshness, outdated packages, CVE advisories across 5 repos.

  - id: harness-update
    label: AI harness tools daily update (staggered canary)
    schedule_by_machine:
      dev-primary: "15 1 * * *"      # 01:15 — canary
      ace-linux-1: "15 1 * * *"
      dev-secondary: "45 1 * * *"    # 01:45 — after canary
      ace-linux-2: "45 1 * * *"
      licensed-win-1: "15 2 * * *"   # 02:15 — after Linux
      licensed-win-2: "15 2 * * *"
    schedule: "15 1 * * *"           # fallback
    machines: [dev-primary, ace-linux-1, dev-secondary, ace-linux-2, licensed-win-1, licensed-win-2]
    requires: [bash, git, npm]
    prefer: dev-primary
    command: >-
      PATH=$HOME/.local/bin:$HOME/.npm-global/bin:$PATH;
      cd $WORKSPACE_HUB &&
      bash scripts/cron/harness-update.sh
      >> $WORKSPACE_HUB/logs/maintenance/harness-update-$(date +\%Y-\%m-\%d).log 2>&1
    log: logs/maintenance/harness-update-*.log
    is_claude_task: false
    description: >-
      Daily AI harness lifecycle — all 7 tools. Staggered canary: dev-primary 01:15,
      dev-secondary 01:45, Windows 02:15. Health checks, rollback, drift, alerting.
      Issues: #1668, #1672-#1675.

  - id: comprehensive-learning
    label: Comprehensive learning pipeline
    schedule: "0 2 * * *"
    machines: [dev-primary, ace-linux-1]
    requires: [python3, uv, git]
    command: >-
      cd $WORKSPACE_HUB &&
      bash scripts/cron/comprehensive-learning-nightly.sh
      >> $WORKSPACE_HUB/logs/quality/comprehensive-learning-$(date +\%Y\%m\%d).log 2>&1
    log: logs/quality/comprehensive-learning-*.log
    is_claude_task: false
    description: Nightly 10-phase learning pipeline; runs at 02:00.

  - id: doc-drift
    label: Documentation drift baseline refresh
    schedule: "30 2 * * *"
    machines: [dev-primary, ace-linux-1]
    requires: [python3, uv]
    command: >-
      cd $WORKSPACE_HUB &&
      uv run --no-project python scripts/quality/check_doc_drift.py --update-baseline
      >> $WORKSPACE_HUB/logs/quality/doc-drift-$(date +\%Y\%m\%d).yaml 2>&1
    log: logs/quality/doc-drift-*.yaml
    is_claude_task: false
    description: Detects symbol-to-doc drift across repos.

  - id: agent-radar
    label: Agent capability radar HTML
    schedule: "30 2 * * *"
    machines: [dev-primary, ace-linux-1]
    requires: [python3, uv]
    command: >-
      PATH=$HOME/.local/bin:$PATH;
      cd $WORKSPACE_HUB &&
      uv run --script scripts/ai/generate-agent-radar.py
      >> $WORKSPACE_HUB/logs/quality/agent-radar-$(date +\%Y\%m\%d).log 2>&1
    log: logs/quality/agent-radar-*.log
    is_claude_task: false
    description: Daily capability radar HTML regeneration.

  - id: ai-tools-status
    label: AI CLI version check
    schedule: "15 3 * * 0"
    machines: [dev-primary, ace-linux-1]
    requires: [claude, gemini]
    command: >-
      cd $WORKSPACE_HUB &&
      timeout 60 bash scripts/maintenance/ai-tools-status.sh
      >> $WORKSPACE_HUB/logs/maintenance/ai-tools-status-$(date +\%Y\%m\%d).log 2>&1
    log: logs/maintenance/ai-tools-status-*.log
    is_claude_task: false
    description: Weekly env parity audit (Sunday 03:15); overwrites ai-tools-status.yaml.

  - id: model-ids
    label: Model ID refresh
    schedule: "30 3 * * 0"
    machines: [dev-primary, ace-linux-1]
    requires: [bash, git]
    command: >-
      cd $WORKSPACE_HUB &&
      bash scripts/cron/update-model-ids.sh
      >> $WORKSPACE_HUB/logs/maintenance/model-ids-$(date +\%Y\%m\%d).log 2>&1
    log: logs/maintenance/model-ids-*.log
    is_claude_task: false
    description: Weekly model-ID refresh (Sunday 03:30); updates model-registry.yaml.

  - id: harness-lean-out
    label: Harness file lean-out audit
    schedule: "30 3 * * 1"
    machines: [dev-primary, ace-linux-1]
    requires: [bash, git]
    command: >-
