# ─── 5. QUALITY AUDIT ───────────────────────────────────────────────
# Sampled 60 summaries (20 per source: og_standards, ace_standards, workspace_spec)
quality:
  total_sampled: 60
  useful_pct: 83        # non-stub, has keywords, summary > 30 chars
  stub_pct: 10          # "Unknown:" prefix or summary < 20 chars
  has_keywords_pct: 100
  has_discipline_pct: 100
  summary_schema_keys:
    - path
    - sha256
    - source
    - org
    - doc_number
    - title
    - discipline
    - summary
    - keywords
    - extraction_method
    - llm_at
    - llm_method
  methods_observed:
    astm_deterministic: "ASTM doc number parsing — fast, no LLM cost"
    pdftotext: "pdftotext first-3-pages extraction + LLM summary"
    claude-subagent: "Full LLM summarization via Claude Haiku"
  per_source_quality:
    og_standards: {sampled: 20, useful: 12, stubs: 5}
    ace_standards: {sampled: 20, useful: 18, stubs: 1}
    workspace_spec: {sampled: 20, useful: 20, stubs: 0}
  notes: >
    83% of existing summaries are useful for downstream work. The 10% stubs
    are mostly documents where pdftotext extracted no meaningful text (scanned
    images, corrupted PDFs). Workspace spec summaries are highest quality
    because source docs are structured markdown.

# ─── 6. ACCESSIBILITY ───────────────────────────────────────────────
accessibility:
  current_machine: ace-linux-2 (dev-secondary)
  ace_nfs_mount: not_available
  local_summaries: accessible
  index_file: accessible
  config_file: accessible
  scripts: accessible
  finding: >
    The canonical summaries path (/mnt/remote/ace-linux-1/ace/data/document-index/summaries/)
    is NOT accessible from this machine. Scripts fall back to the local copy, which works
    but may be stale if the ace drive has newer summaries. The config.yaml hardcodes the
    ace path; the $SUMMARIES_DIR env var override mechanism documented in
    DATA_RESIDENCE_POLICY.md is the correct workaround.

# ─── 7. DOWNSTREAM CONSUMERS ────────────────────────────────────────
downstream_scripts:
  producers:
    - script: scripts/data/document-index/phase-b-claude-worker.py
      role: "Primary LLM summarization worker (Claude Haiku)"
    - script: scripts/data/document-index/summarise-worker.py
      role: "Alternative summarization worker"
    - script: scripts/data/document-index/phase-b-extract.py
      role: "Text extraction + summary orchestration"
    - script: scripts/data/document-index/phase_b_astm_classifier.py
      role: "ASTM deterministic classifier (no LLM)"
    - script: scripts/data/document-index/phase_b_checkpoint.py
      role: "Checkpoint management for batch summarization"

  consumers:
    - script: scripts/data/document-index/build-capability-map.py
      role: "Builds doc-to-repo capability map from summaries"
      reads_summaries: true
      status: functional
      notes: "Falls back to synthetic summaries when Phase B files unavailable"
    - script: scripts/data/document-index/phase-c-classify.py
      role: "LLM domain classification using summaries"
      reads_summaries: true
      status: functional
      notes: "On-demand summary loading; graceful fallback"
    - script: scripts/data/document-index/phase-d-data-sources.py
      role: "Generate per-repo data-source specs"
      reads_summaries: true
      status: functional
      notes: "Can build plan from summaries if enhancement-plan missing"
    - script: scripts/data/document-index/phase-e-backpopulate.py
      role: "Back-populate domain/status into index.jsonl"
      reads_summaries: false
      status: functional
      notes: "Uses path/org heuristics only — does NOT read summaries"
    - script: scripts/data/document-index/phase-e-registry.py
      role: "Build master registry linking index + summary data"
      reads_summaries: true
      status: functional
    - script: scripts/data/document-index/phase-f-gap-wrk-generator.py
      role: "Generate work items for gap documents"
      reads_summaries: true
      status: functional
      notes: "Reads from relative data/document-index/summaries path"
    - script: scripts/data/document-index/naval-arch-intelligence.py
      role: "Naval architecture document intelligence extraction"
      reads_summaries: true
      status: functional
    - script: scripts/data/document-index/reclassify-audit.py
      role: "Incremental domain reclassification audit"
      reads_summaries: false
      status: functional
    - script: scripts/data/document-index/subcategory-classify.py
      role: "Subcategory classification"
      reads_summaries: false
      status: functional

  stale_or_broken: none_detected
  notes: >
    All consumer scripts have graceful fallbacks when summaries are unavailable.
    build-capability-map.py generates synthetic summaries from index fields.
    No scripts are broken, though all would benefit from higher coverage.

