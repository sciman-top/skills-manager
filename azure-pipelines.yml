trigger:
- main

pr:
- main

pool:
  vmImage: 'windows-latest'

steps:
- checkout: self

- pwsh: |
    pwsh -NoProfile -ExecutionPolicy Bypass -File scripts/quality/check-repo-hygiene.ps1
  displayName: Check repository hygiene

- pwsh: |
    if (Test-Path "scripts/quality/run-local-quality-gates.ps1") {
      pwsh -NoProfile -ExecutionPolicy Bypass -File scripts/quality/run-local-quality-gates.ps1 -Profile quick
    } else {
      Write-Host "No project quality script found, skip."
    }
  displayName: Run local quality gates

- pwsh: |
    if (Test-Path "scripts/quality/run-supply-chain-checks.ps1") {
      pwsh -NoProfile -ExecutionPolicy Bypass -File scripts/quality/run-supply-chain-checks.ps1 -Profile quick
    } else {
      Write-Host "No supply-chain script found, skip."
    }
  displayName: Run supply-chain checks

- pwsh: |
    if (Test-Path "scripts/quality/check-waivers.ps1") {
      pwsh -NoProfile -ExecutionPolicy Bypass -File scripts/quality/check-waivers.ps1
    } else {
      Write-Host "No waiver-check script found, skip."
    }
  displayName: Check waiver expiry
