name: Bug report
description: Report a reproducible bug
title: "[Bug] "
labels: [bug]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened and what did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Include exact commands and environment.
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Logs and evidence
      description: Paste key output, errors, and screenshots if available.
