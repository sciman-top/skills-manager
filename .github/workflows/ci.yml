name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check repository hygiene
        shell: pwsh
        run: .\scripts\quality\check-repo-hygiene.ps1

      - name: Verify generated script sync
        shell: pwsh
        run: .\tests\check-generated-sync.ps1 -StrictNoGit

      - name: Verify dependency baseline contract
        shell: pwsh
        run: python .\scripts\verify-dependency-baseline.py --target-repo-root . --require-target-repo-baseline

      - name: Verify doctor JSON contract
        shell: pwsh
        env:
          SKILLS_SYNC_MCP_THRESHOLD_MS: 12000
        run: .\scripts\quality\check-doctor-json.ps1

      - name: Run tests
        shell: pwsh
        run: .\tests\run.ps1
